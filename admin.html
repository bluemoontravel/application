<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>BlueMoon Admin</title>
  <style>
    :root {
      --text: #e5e7eb;
      --muted: #94a3b8;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
      background: radial-gradient(circle at top, #1e293b, #0b1020 65%);
      color: var(--text);
      min-height: 100vh;
    }
    .page {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }
    .header {
      display: flex;
      align-items: center;
      background: #ffffff;
      border-bottom: 1px solid rgba(13, 110, 253, 0.15);
      padding: 14px 24px;
      position: sticky;
      top: 0;
      z-index: 1000;
      width: 100%;
    }
    .logo {
      display: inline-flex;
      align-items: center;
      text-decoration: none;
    }
    .logo img {
      height: 36px;
      width: auto;
      display: block;
    }
    .layout {
      display: flex;
      flex: 1;
      min-height: 0;
    }
    .sidebar {
      width: 220px;
      background: rgba(15, 23, 42, 0.8);
      border-right: 1px solid rgba(148, 163, 184, 0.2);
      padding: 18px 12px;
    }
    .tab {
      display: block;
      width: 100%;
      text-align: left;
      color: #e2e8f0;
      padding: 10px 12px;
      border-radius: 8px;
      margin-bottom: 8px;
      font-weight: 600;
      background: transparent;
      border: 1px solid transparent;
      cursor: pointer;
      font-size: 1rem;
    }
    .tab:hover {
      background: rgba(148, 163, 184, 0.12);
      border-color: rgba(148, 163, 184, 0.25);
    }
    .tab.active {
      background: rgba(34, 197, 94, 0.16);
      border-color: rgba(34, 197, 94, 0.4);
      color: #bbf7d0;
    }
    .content {
      flex: 1;
      padding: 22px;
    }
    .panel {
      background: rgba(17, 24, 39, 0.9);
      border: 1px solid rgba(148, 163, 184, 0.2);
      border-radius: 14px;
      padding: 22px;
    }
    .panel h2 {
      margin: 0 0 8px;
      font-size: 1.4rem;
    }
    .panel p {
      margin: 0;
      color: var(--muted);
    }
    .upload-row {
      margin-bottom: 14px;
    }
    input[type="file"] {
      color: var(--text);
    }
    .note {
      color: var(--muted);
      font-size: 0.95rem;
      margin-bottom: 12px;
    }
    .uploaded-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(130px, 1fr));
      gap: 12px;
    }
    .uploaded-grid img {
      width: 100%;
      aspect-ratio: 1 / 1;
      object-fit: cover;
      border-radius: 10px;
      border: 1px solid rgba(148, 163, 184, 0.25);
      background: #0f172a;
    }
    .empty {
      color: var(--muted);
      padding: 8px 0;
    }
    .hidden {
      display: none;
    }
  </style>
</head>
<body>
  <div class="page">
    <header class="header">
      <a class="logo" href="index.html" aria-label="BlueMoon Home">
        <img src="logo.svg" alt="BlueMoon Logo" />
      </a>
    </header>
    <div class="layout">
      <aside class="sidebar">
        <button class="tab active" data-tab="dashboard" type="button">Dashboard</button>
        <button class="tab" data-tab="pictures" type="button">Pictures</button>
        <button class="tab" data-tab="data" type="button">Data</button>
      </aside>
      <main class="content">
        <section id="dashboard" class="panel">
          <h2>Dashboard</h2>
          <p>Use the Pictures tab to upload images for the landing page.</p>
        </section>
        <section id="pictures" class="panel hidden">
          <h2>Pictures</h2>
          <p class="note">Upload pictures here. They will show on the landing page automatically.</p>
          <div class="upload-row">
            <input id="imageInput" type="file" accept="image/*" multiple />
          </div>
          <div id="emptyState" class="empty">No pictures uploaded yet.</div>
          <div id="uploadedGrid" class="uploaded-grid"></div>
        </section>
        <section id="data" class="panel hidden">
          <h2>Data</h2>
          <p class="note">Save text content to server. It will show on the landing page.</p>
          <div class="upload-row">
            <input id="dataTitle" type="text" placeholder="Title" style="width: 100%; max-width: 420px; padding: 10px; border-radius: 8px; border: 1px solid rgba(148,163,184,0.3); background: rgba(15,23,42,0.7); color: #e5e7eb;" />
          </div>
          <div class="upload-row">
            <textarea id="dataBody" placeholder="Description" rows="4" style="width: 100%; max-width: 620px; padding: 10px; border-radius: 8px; border: 1px solid rgba(148,163,184,0.3); background: rgba(15,23,42,0.7); color: #e5e7eb;"></textarea>
          </div>
          <div class="upload-row">
            <button id="saveDataBtn" type="button" style="padding: 10px 14px; border-radius: 8px; border: 0; background: #22c55e; color: #052e16; font-weight: 700; cursor: pointer;">Save Data</button>
          </div>
          <div id="dataEmpty" class="empty">No server data yet.</div>
          <div id="dataList"></div>
        </section>
      </main>
    </div>
  </div>

  <script>
    async function fetchImages() {
      const response = await fetch("/api/pictures");
      if (!response.ok) throw new Error("Failed to fetch pictures");
      return response.json();
    }

    async function renderUploadedImages() {
      const grid = document.getElementById("uploadedGrid");
      const empty = document.getElementById("emptyState");

      grid.innerHTML = "";
      try {
        const images = await fetchImages();
        if (!images.length) {
          empty.classList.remove("hidden");
          return;
        }

        empty.classList.add("hidden");
        images.forEach((src, index) => {
          const img = document.createElement("img");
          img.src = src;
          img.alt = `Uploaded picture ${index + 1}`;
          grid.appendChild(img);
        });
      } catch (error) {
        empty.textContent = "Failed to load pictures.";
        empty.classList.remove("hidden");
      }
    }

    async function handleImageUpload(event) {
      const files = Array.from(event.target.files || []);
      if (!files.length) return;

      const formData = new FormData();
      files.forEach((file) => formData.append("pictures", file));

      try {
        const response = await fetch("/api/pictures", {
          method: "POST",
          body: formData
        });
        if (!response.ok) throw new Error("Upload failed");
        await renderUploadedImages();
      } catch (error) {
        alert("Image upload failed. Please try again.");
      } finally {
        event.target.value = "";
      }
    }

    async function fetchContent() {
      const response = await fetch("/api/content");
      if (!response.ok) throw new Error("Failed to fetch content");
      return response.json();
    }

    async function renderContentList() {
      const list = document.getElementById("dataList");
      const empty = document.getElementById("dataEmpty");
      list.innerHTML = "";
      try {
        const items = await fetchContent();
        if (!items.length) {
          empty.classList.remove("hidden");
          return;
        }
        empty.classList.add("hidden");
        items.forEach((item) => {
          const card = document.createElement("div");
          card.style.padding = "12px";
          card.style.border = "1px solid rgba(148,163,184,0.25)";
          card.style.borderRadius = "10px";
          card.style.marginBottom = "10px";
          card.style.background = "rgba(15,23,42,0.5)";
          card.innerHTML = `<strong>${item.title}</strong><div style="margin-top:6px;color:#cbd5e1;">${item.body}</div>`;
          list.appendChild(card);
        });
      } catch (error) {
        empty.textContent = "Failed to load server data.";
        empty.classList.remove("hidden");
      }
    }

    async function saveContent() {
      const titleInput = document.getElementById("dataTitle");
      const bodyInput = document.getElementById("dataBody");
      const title = titleInput.value.trim();
      const body = bodyInput.value.trim();
      if (!title || !body) {
        alert("Please enter title and description.");
        return;
      }
      const response = await fetch("/api/content", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ title, body })
      });
      if (!response.ok) {
        alert("Failed to save data.");
        return;
      }
      titleInput.value = "";
      bodyInput.value = "";
      await renderContentList();
    }

    function setupTabs() {
      const tabs = document.querySelectorAll(".tab");
      const sections = {
        dashboard: document.getElementById("dashboard"),
        pictures: document.getElementById("pictures"),
        data: document.getElementById("data")
      };

      tabs.forEach((tab) => {
        tab.addEventListener("click", () => {
          tabs.forEach((t) => t.classList.remove("active"));
          tab.classList.add("active");

          Object.values(sections).forEach((section) => section.classList.add("hidden"));
          sections[tab.dataset.tab].classList.remove("hidden");
        });
      });
    }

    document.getElementById("imageInput").addEventListener("change", handleImageUpload);
    document.getElementById("saveDataBtn").addEventListener("click", saveContent);
    setupTabs();
    renderUploadedImages();
    renderContentList();
  </script>
</body>
</html>
